name: Notion Workspace Backup Engine

on:
  schedule:
    - cron: '*/5 * * * *'  # Every 5 minutes (GitHub's minimum)
  workflow_dispatch:
    inputs:
      force_full_backup:
        description: 'Force a full backup'
        required: false
        default: 'false'

permissions:
  contents: write

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Node.js Runtime
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: npm ci

      - name: Execute Backup
        env:
          NOTION_TOKEN: ${{ secrets.NOTION_TOKEN }}
          NOTION_PAGE_ID: ${{ secrets.NOTION_PAGE_ID }}
          FORCE_FULL: ${{ github.event.inputs.force_full_backup || 'false' }}
        run: npm start
